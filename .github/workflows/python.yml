name: Python

# Run either when pushing directly to main/master or in a PR targeting main/master
on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/python.yml"
      - "**.py"
      - "**.pyi"
  pull_request:
    paths:
      - ".github/workflows/python.yml"
      - "**.py"
      - "**.pyi"

# Cancel previous runs for PRs but not pushes to main
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && 'master' || github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash
    working-directory: python-pyo3

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "python-pyo3/pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Ruff lint
        run: uvx ruff check --output-format=github .

      - name: Ruff format
        run: uvx ruff format --check --verbose .

      - name: Type check
        run: uvx ty check .
